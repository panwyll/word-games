name: Architect - Epic Decomposition

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write

jobs:
  architect:
    if: github.event.label.name == 'needs-architecture'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install @github/copilot-sdk

      - name: Run Architect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/ai/architect.mjs ${{ github.event.issue.number }}
